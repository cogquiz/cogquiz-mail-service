version: '3.8'

services:
  mail-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3005:3005"
    environment:
      - SERVICE_PORT=3005
      - SERVICE_NAME=cogquiz-mail-service
      - NODE_ENV=development
      - SMTP_USER=${SMTP_USER:-cogquizoutbound@gmail.com}
      - SMTP_PASS=${SMTP_PASS}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-secret-key}
    restart: unless-stopped
    networks:
      - cogquiz-network

networks:
  cogquiz-network:
    driver: bridge
